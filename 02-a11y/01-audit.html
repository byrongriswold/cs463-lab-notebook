<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
    <style>
      fieldset {
        margin: 0;
        border: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Exercise 01 Form</h1>
      <form>
        <div class="form-control">
          <label for="name">Name:</label><br />
          <input id="name" type="text" name="name" /><br /><br />
        </div>
        <div class="form-control">
          <label for="address">Address:</label><br />
          <input id="address" type="text" name="address" /><br /><br />
        </div>
        <div class="form-control">
          <label for="city">City:</label><br />
          <input id="city" type="text" name="city" /><br /><br />
        </div>
        <div class="form-control">
          <label for="zip">Zip Code:</label><br />
          <input id="zip" type="text" name="zip" /><br /><br />
        </div>
        <fieldset>
          <legend>Credit Card Type:</legend>
          <input id="visa" type="radio" name="card" value="visa" />
          <label for="visa">Visa</label><br />
          <input id="mastercard" type="radio" name="card" value="mastercard" />
          <label for="mastercard">MasterCard</label><br />
          <input id="amex" type="radio" name="card" value="amex" />
          <label for="amex">American Express</label><br /><br />
        </fieldset>
        <div>
          <label for="cc_number">Credit Card Number:</label><br />
          <input id="cc_number" type="text" name="cc_number" /><br /><br />
        </div>
        <div>
          <label for="cvv">CVV:</label><br />
          <input id="cvv" type="text" name="cvv" /><br /><br />
        </div>
        <input type="button" value="Submit" />
      </form>
    </main>
  </body>
</html>
